version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: trendyol-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: trendyol-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: trendyol-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: trendyol-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: trendyol-elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: trendyol-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      echo 'Waiting for Kafka to be ready...'
      sleep 5

      # Create topics
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic user-events --partitions 3 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic product-events --partitions 6 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic product-stock-events --partitions 6 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic review-events --partitions 3 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic order-events --partitions 6 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic payment-events --partitions 3 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic cart-events --partitions 3 --replication-factor 1

      # DLQ topics
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic user-events.DLT --partitions 1 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic product-events.DLT --partitions 1 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic order-events.DLT --partitions 1 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic payment-events.DLT --partitions 1 --replication-factor 1

      echo 'All topics created successfully!'
      kafka-topics --list --bootstrap-server kafka:29092
      "

volumes:
  postgres-data:

networks:
  default:
    name: trendyol-network
    driver: bridge
